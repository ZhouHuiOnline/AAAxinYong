<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端缩放适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全国企业信用信息公示平台 - 河北州晖管道装备有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimSun, sans-serif;
        }
        body {
            width: 100%;
            max-width: 1731px;
            margin: 0 auto;
            overflow-x: hidden;
        }
        /* 顶部红条：文字左对齐，取消居中 */
        .top-red-bar {
            background: #d80000;
            color: #fff;
            padding: 8px 20px;
            font-size: clamp(12px, 2vw, 14px);
            text-align: left;
        }
        /* 导航栏蓝色 */
        .nav-bar {
            background: #1954b9;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 10px;
            min-height: 50px;
        }
        .nav-item {
            color: #fff;
            font-size: clamp(14px, 2.2vw, 16px);
            padding: 0 12px;
            line-height: 50px;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-box {
            margin: 8px auto;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 4px;
            padding: 5px 10px;
            width: min(220px, 90%);
        }
        .search-input {
            border: none;
            outline: none;
            font-size: 14px;
            flex: 1;
        }
        .search-btn {
            border-left: 1px solid #ccc;
            padding-left: 8px;
            cursor: pointer;
        }
        /* 头部红色大区域：强制同行，禁止换行，删除移动端竖排样式 */
        .header-red-big {
            background: #d80000;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap; /* 强制不换行 */
            gap: 20px;
        }
        .logo-circle {
            width: clamp(70px, 12vw, 100px);
            height: clamp(70px, 12vw, 100px);
            border-radius: 50%;
            border: 3px solid #fff;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0; /* logo固定尺寸，不压缩 */
        }
        .logo-circle img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:50%;
        }
        /* 主标题：强制不换行，允许小幅缩放但始终同行 */
        .main-title {
            font-size: clamp(24px, 6vw, 38px);
            color: #000;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: "KaiTi", "楷体", SimSun, serif;
            white-space: nowrap;
            flex-shrink: 1;
        }
        /* 大厅横幅图 */
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 红底标语栏 */
        .slogan-bar {
            background: #d80000;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 10px;
        }
        .slogan-text {
            font-size: clamp(16px, 4vw, 24px);
            color: #000;
            font-family: "KaiTi", "楷体", SimSun, serif;
        }
        /* 面包屑路径 */
        .breadcrumb {
            padding: 15px 15px;
            font-size: clamp(12px, 2vw, 14px);
            color: #333;
        }
        .breadcrumb a {
            color: #1954b9;
            text-decoration: none;
        }
        /* 公司名称标题 */
        .company-name-title {
            text-align: center;
            font-size: clamp(18px, 4vw, 26px);
            font-weight: bold;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            width: 95%;
            margin: 0 auto;
        }
        /* 蓝色分隔条 */
        .blue-divider {
            background: #1954b9;
            height: 40px;
            width: 95%;
            margin: 20px auto;
        }
        /* 底部版权文字 */
        .copyright-text {
            text-align: center;
            font-size: clamp(11px, 1.8vw, 13px);
            color: #5577aa;
            line-height: 24px;
            padding: 10px 15px;
        }
        /* 右下角客服头像 */
        .service-avatar {
            position: fixed;
            right: 20px;
            top: 450px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow:hidden;
        }
        .service-avatar img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        /* 媒体查询：完全删除header-red-big竖排代码，只微调导航栏 */
        @media screen and (max-width: 768px) {
            .nav-bar {
                padding: 5px 0;
            }
            .nav-item {
                line-height: 40px;
            }
            /* 移除原手机端flex-direction:column，保持横向一行 */
        }
    </style>
</head>
<body>
    <!-- 顶部红色欢迎栏：文字靠左 -->
    <div class="top-red-bar">欢迎访问全国企业信用联盟共享网</div>

    <!-- 蓝色导航栏 -->
    <div class="nav-bar">
        <div class="nav-item">首页</div>
        <div class="nav-item">政策文件</div>
        <div class="nav-item">行业规范</div>
        <div class="nav-item">信用建设</div>
        <div class="nav-item">热点推荐</div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="企业信用查询会员中心">
            <span class="search-btn">🔍</span>
        </div>
    </div>

    <!-- 大红头区域 logo+大标题：永久同行不换行 -->
    <div class="header-red-big">
        <div class="logo-circle">
            <img src="imges/20171954_1597891349.webp" alt="信用logo">
        </div>
        <div class="main-title">全国企业信用信息公示平台</div>
    </div>

    <!-- 会场大厅大图 -->
    <img src="imges/tmp1597890157_1799260_s.webp" alt="会场大厅" class="banner-img">

    <!-- 标语红条 -->
    <div class="slogan-bar">
        <div class="slogan-text">追求质量诚信</div>
        <div class="slogan-text">践行社会责任</div>
    </div>

    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="#">首页</a> >> <a href="#">证书查询公示系统</a> >> <span>河北州晖管道装备有限公司</span>
    </div>

    <!-- 公司大标题 -->
    <div class="company-name-title">河北州晖管道装备有限公司</div>

    <!-- 蓝色横条 -->
    <div class="blue-divider"></div>

    <!-- 底部版权信息 -->
    <div class="copyright-text">
        版权所有: 中国企业信用建设联合委员会<br>
        技术支持: 中国信用建设委员会办公室<br>
        指导文件: 国办发(2014)第21号《国务院社会信用体系建设规划纲要（2014-2020年）》国办(2007)第17号《国务院办公厅关于社会信用体系建设的若干意见》国务院办公厅《征信业管理条例》(中华人民共和国国务院令第631号)<br>
        <br>
    </div>

    <!-- 右侧客服头像 
    <div class="service-avatar">
        <img src="kefu.png" alt="客服">
    </div>
    -->
</body>
</html>
